name: Web3 dApp Deployment Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build Docker Image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/apploy-app:${{ github.sha }} .

      # 5. Push Image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/apploy-app:${{ github.sha }}

      # 6. Call Backend (Flux Deployment)
      - name: Deploy to Flux via Backend
        run: |
          curl -X POST ${{ secrets.BACKEND_URL }}/deploy \
          -H "Content-Type: application/json" \
          -d '{
            "image": "${{ secrets.DOCKER_USERNAME }}/apploy-app:${{ github.sha }}",
            "repo": "${{ github.repository }}",
            "commit": "${{ github.sha }}"
          }'
